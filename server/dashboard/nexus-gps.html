<!-- === GPS PAGE HTML === -->
<section id="gps-page" class="page-section">

  <!-- Header -->
  <div class="gps-header">
    <div class="gps-title-block">
      <h2 class="gps-title">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <path d="M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/>
        </svg>
        Mappa GPS
      </h2>
      <span id="gps-status-badge" class="gps-status-badge offline">Offline</span>
    </div>

    <!-- Controls Row -->
    <div class="gps-controls">
      <!-- Filter Buttons -->
      <div class="gps-filter-group" role="group" aria-label="Filtro temporale">
        <button class="gps-filter-btn active" data-filter="today">Oggi</button>
        <button class="gps-filter-btn" data-filter="7days">7 Giorni</button>
        <button class="gps-filter-btn" data-filter="all">Tutto</button>
      </div>

      <!-- Action Buttons -->
      <div class="gps-action-group">
        <button id="gps-btn-center" class="gps-action-btn" title="Centra mappa sul percorso">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L12 6M12 18L12 22M2 12L6 12M18 12L22 12"/>
            <circle cx="12" cy="12" r="4"/>
          </svg>
          Centra
        </button>
        <button id="gps-btn-refresh" class="gps-action-btn" title="Aggiorna dati GPS">
          <svg id="gps-refresh-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
          Aggiorna
        </button>
      </div>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="gps-stats-bar">
    <div class="gps-stat">
      <span class="gps-stat-label">Punti</span>
      <span class="gps-stat-value" id="gps-stat-points">—</span>
    </div>
    <div class="gps-stat-divider"></div>
    <div class="gps-stat">
      <span class="gps-stat-label">Ultima posizione</span>
      <span class="gps-stat-value" id="gps-stat-last">—</span>
    </div>
    <div class="gps-stat-divider"></div>
    <div class="gps-stat">
      <span class="gps-stat-label">Accuratezza</span>
      <span class="gps-stat-value" id="gps-stat-accuracy">—</span>
    </div>
    <div class="gps-stat-divider"></div>
    <div class="gps-stat">
      <span class="gps-stat-label">Auto-refresh</span>
      <span class="gps-stat-value" id="gps-stat-refresh">—</span>
    </div>
  </div>

  <!-- Map Container -->
  <div class="gps-map-wrapper">
    <div id="gps-map"></div>
    <!-- Loading Overlay -->
    <div id="gps-loading" class="gps-loading-overlay">
      <div class="gps-loader">
        <div class="gps-loader-ring"></div>
        <span>Caricamento dati GPS…</span>
      </div>
    </div>
    <!-- Empty State -->
    <div id="gps-empty" class="gps-empty-overlay" style="display:none;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.4">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      <p id="gps-empty-msg">Nessun dato GPS disponibile</p>
    </div>
  </div>

  <!-- Auto-refresh countdown bar -->
  <div class="gps-refresh-bar-wrap" id="gps-refresh-bar-wrap" style="display:none;">
    <div class="gps-refresh-bar-label">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#00d4ff" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      Prossimo aggiornamento: <span id="gps-countdown">30</span>s
    </div>
    <div class="gps-refresh-progress-track">
      <div class="gps-refresh-progress-fill" id="gps-refresh-progress"></div>
    </div>
  </div>

</section>
<!-- === END GPS PAGE HTML === -->
